<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <main>
        <p class="eyebrow">Flask Portfolio Project</p>
        <h1>Web Calculator</h1>
        <p class="intro">A simple calculator built with Python, Flask, HTML, CSS, and JavaScript.</p>

        <form id="calculator-form" method="post">
            <div class="result-display" id="result-display" aria-live="polite">
                <span class="result-label">Result</span>
                {% if result is not none %}
                    <span class="result-value">{{ result }}</span>
                {% else %}
                    <span class="result-placeholder">Enter an expression below, then press =.</span>
                {% endif %}
            </div>

            <div class="display">
                <label for="expression">Expression</label>
                <input
                    id="expression"
                    name="expression"
                    placeholder="0"
                    type="text"
                    autofocus
                >
            </div>

            <div class="buttons">
                <button class="calculator-button danger" data-action="clear" type="button">C</button>
                <button class="calculator-button" data-action="backspace" type="button">⌫</button>
                <button class="calculator-button operator" data-value="%" type="button">%</button>
                <button class="calculator-button operator" data-value="÷" type="button">÷</button>

                <button class="calculator-button" data-value="7" type="button">7</button>
                <button class="calculator-button" data-value="8" type="button">8</button>
                <button class="calculator-button" data-value="9" type="button">9</button>
                <button class="calculator-button operator" data-value="×" type="button">×</button>

                <button class="calculator-button" data-value="4" type="button">4</button>
                <button class="calculator-button" data-value="5" type="button">5</button>
                <button class="calculator-button" data-value="6" type="button">6</button>
                <button class="calculator-button operator" data-value="-" type="button">−</button>

                <button class="calculator-button" data-value="1" type="button">1</button>
                <button class="calculator-button" data-value="2" type="button">2</button>
                <button class="calculator-button" data-value="3" type="button">3</button>
                <button class="calculator-button operator" data-value="+" type="button">+</button>

                <button class="calculator-button" data-value="0" type="button">0</button>
                <button class="calculator-button" data-value="(" type="button">(</button>
                <button class="calculator-button" data-value=")" type="button">)</button>
                <button class="calculator-button" data-value="." type="button">.</button>

                <button class="calculator-button equals" data-action="equals" type="button">=</button>
            </div>
        </form>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
